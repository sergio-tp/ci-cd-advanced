name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Ruff lint
        run: uv run --python 3.14 ruff check .

      - name: Ruff format check
        run: uv run --python 3.14 ruff format --check .

      - name: Ty type check
        run: uv run --python 3.14 ty check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Run pytest
        run: uv run --python 3.14 pytest -q

  train:
    name: Train and validate
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Train, validate and enforce quality gate
        run: uv run --python 3.14 python scripts/run_ci_pipeline.py --minimum-score 0.80

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: public/index.html

  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    needs: train
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: validation-report
          path: public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
